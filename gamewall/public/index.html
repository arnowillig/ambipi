<!-- File: public/index.html
     Responsive control UI with strict 2-column layout:
     Rows: (5|1), (6|2), (7|3), (8|4)
     IP/port hardcoded and not displayed. -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Gamewall Shelves</title>
<style>
  :root{--bg:#0f1117;--fg:#eaeefb;--muted:#9aa4b2;--card:#151824;--accent:#4f46e5;}
  html,body{background:var(--bg);color:var(--fg);margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans",sans-serif;}
  header{padding:16px 20px;display:flex;gap:16px;align-items:center;background:#0b0d13;border-bottom:1px solid #1e2230;}
  h1{font-size:18px;margin:0;letter-spacing:.3px;}
  main{padding:20px;max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:20px;}
  .card{background:var(--card);border:1px solid #1e2230;border-radius:16px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.2);}
  /* STRICT two-column grid: children flow as cells: 5,1,6,2,7,3,8,4 */
  .rows{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .shelf{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:12px;border-radius:14px;border:1px solid #23283b;background:#0d0f16;}
  .shelf-title{font-weight:700;}
  button{background:var(--accent);color:white;border:none;padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:600;}
  .row{display:flex;gap:12px;align-items:center;margin:6px 0;}
  .small{font-size:12px;color:var(--muted);}
  input[type="color"]{width:56px;height:38px;border:none;background:transparent;}
  .status{margin-top:8px;min-height:22px;font-size:13px;color:#9ee493;}
  .error{color:#ff6b6b;}
  a{color:#8ab4ff;text-decoration:none;}
  /* Mobile: stack to one column when very narrow */
  @media (max-width: 460px){
    .rows{grid-template-columns:1fr;}
    header{flex-wrap:wrap;}
  }
</style>
</head>
<body>
<header>
  <h1>Gamewall Shelves</h1>
  <div style="flex:1"></div>
  <a href="/swagger.json" target="_blank">swagger.json</a>
</header>

<main>
  <section class="card">
    <div class="row">
      <label for="color" class="small">Color</label>
      <input id="color" type="color" value="#ff0000" aria-label="Color picker">
      <button id="all">Apply to All</button>
    </div>
    <div id="status" class="status"></div>
  </section>

  <section class="card">
    <h3 style="margin:4px 0 12px 0;">Select a shelf</h3>

    <!-- EXACT ORDER AS REQUESTED: 5|1, 6|2, 7|3, 8|4 -->
    <div class="rows">
      <div class="shelf"><span class="shelf-title">Shelf 5</span><button data-shelf="5">Apply</button></div>
      <div class="shelf"><span class="shelf-title">Shelf 1</span><button data-shelf="1">Apply</button></div>

      <div class="shelf"><span class="shelf-title">Shelf 6</span><button data-shelf="6">Apply</button></div>
      <div class="shelf"><span class="shelf-title">Shelf 2</span><button data-shelf="2">Apply</button></div>

      <div class="shelf"><span class="shelf-title">Shelf 7</span><button data-shelf="7">Apply</button></div>
      <div class="shelf"><span class="shelf-title">Shelf 3</span><button data-shelf="3">Apply</button></div>

      <div class="shelf"><span class="shelf-title">Shelf 8</span><button data-shelf="8">Apply</button></div>
      <div class="shelf"><span class="shelf-title">Shelf 4</span><button data-shelf="4">Apply</button></div>
    </div>

    <div class="small" style="margin-top:10px;">Order: 5 | 1 · 6 | 2 · 7 | 3 · 8 | 4</div>
  </section>
</main>

<script>
  // Hardcoded WLED device (hidden from UI)
  const HOST = "192.168.178.146";
  const PORT = "21324";
  const TIMEOUT_SECONDS = 2;

  // Shelf LED ranges (from your shell scripts)
  const SHELF_RANGES = {
    1: [ { startIndex:   0, count: 13 }, { startIndex:  97, count: 20 } ],
    2: [ { startIndex:  13, count: 13 }, { startIndex:  84, count: 13 } ],
    3: [ { startIndex:  26, count: 13 }, { startIndex:  71, count: 13 } ],
    4: [ { startIndex:  39, count: 32 } ],
    5: [ { startIndex: 117, count: 13 }, { startIndex: 214, count: 20 } ],
    6: [ { startIndex: 130, count: 13 }, { startIndex: 201, count: 13 } ],
    7: [ { startIndex: 143, count: 13 }, { startIndex: 188, count: 13 } ],
    8: [ { startIndex: 156, count: 32 } ],
  };

  const statusEl = document.getElementById('status');

  function selectedColor(){ return document.getElementById('color').value.trim(); }

  async function applyRanges(ranges, color) {
    statusEl.classList.remove('error');
    statusEl.textContent = 'Sending...';
    try {
      const res = await fetch('/api/v1/wled/ranges-color', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          host: HOST,
          port: PORT,
          timeoutSeconds: TIMEOUT_SECONDS,
          ranges: ranges.map(r => ({ ...r, color }))
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.ok === false) {
        statusEl.classList.add('error');
        statusEl.textContent = 'Error: ' + (data.error || res.status + ' ' + res.statusText);
      } else {
        statusEl.textContent = 'Applied.';
      }
    } catch (e) {
      statusEl.classList.add('error');
      statusEl.textContent = 'Network error: ' + e;
    }
  }

  // Attach handlers for each shelf button
  document.querySelectorAll('button[data-shelf]').forEach(btn => {
    btn.addEventListener('click', () => {
      const shelfNo = parseInt(btn.dataset.shelf, 10);
      const ranges = SHELF_RANGES[shelfNo] || [];
      if (!ranges.length) {
        statusEl.classList.add('error');
        statusEl.textContent = 'Unknown shelf.';
        return;
      }
      applyRanges(ranges, selectedColor());
    });
  });

  // Apply to all shelves
  document.getElementById('all').addEventListener('click', () => {
    const color = selectedColor();
    const all = [];
    Object.values(SHELF_RANGES).forEach(arr => arr.forEach(r => all.push(r)));
    applyRanges(all, color);
  });
</script>
</body>
</html>
