<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Gamewall Shelves (24 + 12 = 36)</title>
  <style>
    :root{--bg:#0f1117;--fg:#eaeefb;--muted:#9aa4b2;--card:#151824;--accent:#4f46e5;}
    html,body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans",sans-serif;}
    header{padding:16px 20px;display:flex;gap:16px;align-items:center;background:#0b0d13;border-bottom:1px solid #1e2230;}
    h1{font-size:18px;margin:0;}
    main{padding:20px;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:20px;}
    .card{background:var(--card);border:1px solid #1e2230;border-radius:16px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.2);}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    input[type="color"]{width:56px;height:38px;border:none;background:transparent;}
    button{background:var(--accent);color:white;border:none;padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:600;}
    .status{margin-top:8px;min-height:22px;font-size:13px;color:#9ee493;}
    .error{color:#ff6b6b;}
    a{color:#8ab4ff;text-decoration:none;margin-left:auto}
    .grid6{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px;}
    .grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;}
    .shelf{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px;border-radius:14px;border:1px solid #23283b;background:#0d0f16;min-height:64px;}
    .empty{min-height:64px;border-radius:14px;border:1px dashed #23283b;opacity:.35;}
  </style>
</head>
<body>
<header>
  <h1>Gamewall Shelves</h1>
  <a href="/swagger.json" target="_blank" rel="noreferrer">swagger.json</a>
</header>

<main>
  <section class="card">
    <div class="row">
      <label for="color" style="color:var(--muted);font-size:14px;">Color</label>
      <input id="color" type="color" value="#ff0000" aria-label="Color picker">
      <button id="all">Apply to all (1–36)</button>
    </div>
    <div id="status" class="status"></div>
  </section>

  <!-- Right board (6×4): EXACT DOM order so top-left is 21 -->
  <section class="card">
    <h3 style="margin:4px 0 12px 0;">Select a shelf (Right board)</h3>
    <!-- Rows (left→right):
         R1: 21,17,13, 9, 5,1
         R2: 22,18,14,10, 6,2
         R3: 23,19,15,11, 7,3
         R4: 24,20,16,12, 8,4
    -->
    <div class="grid6">
      <!-- R1 -->
      <div class="shelf"><button data-shelf="21">Shelf 21</button></div>
      <div class="shelf"><button data-shelf="17">Shelf 17</button></div>
      <div class="shelf"><button data-shelf="13">Shelf 13</button></div>
      <div class="shelf"><button data-shelf="9">Shelf 9</button></div>
      <div class="shelf"><button data-shelf="5">Shelf 5</button></div>
      <div class="shelf"><button data-shelf="1">Shelf 1</button></div>
      <!-- R2 -->
      <div class="shelf"><button data-shelf="22">Shelf 22</button></div>
      <div class="shelf"><button data-shelf="18">Shelf 18</button></div>
      <div class="shelf"><button data-shelf="14">Shelf 14</button></div>
      <div class="shelf"><button data-shelf="10">Shelf 10</button></div>
      <div class="shelf"><button data-shelf="6">Shelf 6</button></div>
      <div class="shelf"><button data-shelf="2">Shelf 2</button></div>
      <!-- R3 -->
      <div class="shelf"><button data-shelf="23">Shelf 23</button></div>
      <div class="shelf"><button data-shelf="19">Shelf 19</button></div>
      <div class="shelf"><button data-shelf="15">Shelf 15</button></div>
      <div class="shelf"><button data-shelf="11">Shelf 11</button></div>
      <div class="shelf"><button data-shelf="7">Shelf 7</button></div>
      <div class="shelf"><button data-shelf="3">Shelf 3</button></div>
      <!-- R4 -->
      <div class="shelf"><button data-shelf="24">Shelf 24</button></div>
      <div class="shelf"><button data-shelf="20">Shelf 20</button></div>
      <div class="shelf"><button data-shelf="16">Shelf 16</button></div>
      <div class="shelf"><button data-shelf="12">Shelf 12</button></div>
      <div class="shelf"><button data-shelf="8">Shelf 8</button></div>
      <div class="shelf"><button data-shelf="4">Shelf 4</button></div>
    </div>
  </section>

  <!-- Left board (L-shaped 4×4) -->
  <section class="card">
    <h3 style="margin:4px 0 12px 0;">Select a shelf (Left board)</h3>
    <!-- Visual:
         -- -- 29 25
         -- -- 30 26
         35 33 31 27
         36 34 32 28
    -->
    <div class="grid4">
      <!-- Row 1 -->
      <div class="empty" aria-hidden="true"></div>
      <div class="empty" aria-hidden="true"></div>
      <div class="shelf"><button data-shelf="29">Shelf 29</button></div>
      <div class="shelf"><button data-shelf="25">Shelf 25</button></div>
      <!-- Row 2 -->
      <div class="empty" aria-hidden="true"></div>
      <div class="empty" aria-hidden="true"></div>
      <div class="shelf"><button data-shelf="30">Shelf 30</button></div>
      <div class="shelf"><button data-shelf="26">Shelf 26</button></div>
      <!-- Row 3 -->
      <div class="shelf"><button data-shelf="35">Shelf 35</button></div>
      <div class="shelf"><button data-shelf="33">Shelf 33</button></div>
      <div class="shelf"><button data-shelf="31">Shelf 31</button></div>
      <div class="shelf"><button data-shelf="27">Shelf 27</button></div>
      <!-- Row 4 -->
      <div class="shelf"><button data-shelf="36">Shelf 36</button></div>
      <div class="shelf"><button data-shelf="34">Shelf 34</button></div>
      <div class="shelf"><button data-shelf="32">Shelf 32</button></div>
      <div class="shelf"><button data-shelf="28">Shelf 28</button></div>
    </div>
  </section>
</main>

<script>
const statusEl = document.getElementById('status');
const pickColor = () => document.getElementById('color').value.trim();

async function applyShelf(shelfIndex, color) {
  try {
    const res = await fetch('/api/v1/wled/shelf-color', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ shelf: shelfIndex, color })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.ok === false) throw new Error(data.error || res.statusText);
    return true;
  } catch (e) { console.error(`Shelf ${shelfIndex} failed:`, e); return false; }
}

async function applyShelvesBulk(shelves, color) {
  const res = await fetch('/api/v1/wled/shelves-color', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ shelves, color, timeoutSeconds: 2 })
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.ok === false) throw new Error(data.error || res.statusText);
  return data;
}

document.querySelectorAll('button[data-shelf]').forEach(btn => {
  btn.addEventListener('click', async () => {
    const shelfNo = parseInt(btn.dataset.shelf, 10);
    statusEl.classList.remove('error');
    statusEl.textContent = `Sending to shelf ${shelfNo}...`;
    const ok = await applyShelf(shelfNo, pickColor());
    statusEl.textContent = ok ? `Shelf ${shelfNo} updated.` : `Failed to update shelf ${shelfNo}.`;
    if (!ok) statusEl.classList.add('error');
  });
});

// Exact full order (1–36) matching your JSON + physical layout.
// Starts at 21 (top-left), then right board row-wise, then L-shape rows.
document.getElementById('all').addEventListener('click', async () => {
  const color = pickColor();
  const order = [
    21,17,13,9,5,1,
    22,18,14,10,6,2,
    23,19,15,11,7,3,
    24,20,16,12,8,4,
    29,25,30,26,35,33,31,27,36,34,32,28
  ];
  statusEl.classList.remove('error');
  statusEl.textContent = 'Sending to all shelves (1–36)...';
  try {
    const r = await applyShelvesBulk(order, color);
    statusEl.textContent = `Applied to ${r.applied} shelves (1–36).`;
  } catch (e) {
    statusEl.classList.add('error');
    statusEl.textContent = 'Error: ' + e.message;
  }
});
</script>
</body>
</html>
