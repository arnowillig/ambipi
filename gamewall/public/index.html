<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Gamewall Shelves</title>
  <style>
    /* Minimal, mobile-safe, ALWAYS 2 columns */
    :root{--bg:#0f1117;--fg:#eaeefb;--muted:#9aa4b2;--card:#151824;--accent:#4f46e5;}
    html,body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans",sans-serif;}
    header{padding:16px 20px;display:flex;gap:16px;align-items:center;background:#0b0d13;border-bottom:1px solid #1e2230;}
    h1{font-size:18px;margin:0;}
    main{padding:20px;max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:20px;}
    .card{background:var(--card);border:1px solid #1e2230;border-radius:16px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.2);}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    input[type="color"]{width:56px;height:38px;border:none;background:transparent;}
    button{background:var(--accent);color:white;border:none;padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:600;}
    .status{margin-top:8px;min-height:22px;font-size:13px;color:#9ee493;}
    .error{color:#ff6b6b;}
    a{color:#8ab4ff;text-decoration:none;margin-left:auto}

    /* 🔒 Force exactly 2 columns at all widths */
    .grid2{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr)) !important; /* force two columns */
      gap:14px;
    }

    .shelf{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:12px;border-radius:14px;border:1px solid #23283b;background:#0d0f16;
    }
    .shelf-title{font-weight:700;}
  </style>
</head>
<body>
<header>
  <h1>Gamewall Shelves</h1>
  <a href="/swagger.json" target="_blank" rel="noreferrer">swagger.json</a>
</header>

<main>
  <section class="card">
    <div class="row">
      <label for="color" style="color:var(--muted);font-size:14px;">Color</label>
      <input id="color" type="color" value="#ff0000" aria-label="Color picker">
      <button id="all">Apply to All</button>
    </div>
    <div id="status" class="status"></div>
  </section>

  <section class="card">
    <h3 style="margin:4px 0 12px 0;">Select a shelf</h3>

    <!-- EXACT order: 5|1, 6|2, 7|3, 8|4 (two columns, four rows) -->
    <div class="grid2">
      <div class="shelf"><span class="shelf-title">Shelf 5</span><button data-shelf="5">Apply</button></div>
      <div class="shelf"><span class="shelf-title">Shelf 1</span><button data-shelf="1">Apply</button></div>

      <div class="shelf"><span class="shelf-title">Shelf 6</span><button data-shelf="6">Apply</button></div>
      <div class="shelf"><span class="shelf-title">Shelf 2</span><button data-shelf="2">Apply</button></div>

      <div class="shelf"><span class="shelf-title">Shelf 7</span><button data-shelf="7">Apply</button></div>
      <div class="shelf"><span class="shelf-title">Shelf 3</span><button data-shelf="3">Apply</button></div>

      <div class="shelf"><span class="shelf-title">Shelf 8</span><button data-shelf="8">Apply</button></div>
      <div class="shelf"><span class="shelf-title">Shelf 4</span><button data-shelf="4">Apply</button></div>
    </div>

    <div style="font-size:12px;color:var(--muted);margin-top:10px;">Order: 5 | 1 · 6 | 2 · 7 | 3 · 8 | 4 (always two columns)</div>
  </section>
</main>
<script>
// UI bits
const statusEl = document.getElementById('status');
const pickColor = () => document.getElementById('color').value.trim();

// Small helper for pacing UDP sends
const sleep = (ms) => new Promise(res => setTimeout(res, ms));

/**
 * POST /api/v1/wled/shelf-color
 * Returns true on success, false on failure (no throw).
 */
async function applyShelf(shelfIndex, color) {
  try {
    const res = await fetch('/api/v1/wled/shelf-color', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ shelf: shelfIndex, color })
    });
    const data = await res.json().catch(() => ({}));
    return res.ok && data && data.ok !== false;
  } catch {
    return false;
  }
}

/**
 * Apply color to shelves SEQUENTIALLY with a small delay + one retry.
 * This avoids packet loss that can happen when blasting many UDP updates in parallel.
 */
async function applyShelvesSequential(shelves, color) {
  statusEl.classList.remove('error');
  statusEl.textContent = 'Sending...';

  let okCount = 0;
  const failed = [];

  for (const shelf of shelves) {
    // First attempt
    let ok = await applyShelf(shelf, color);

    // Optional: one quick retry if it failed
    if (!ok) {
      await sleep(60); // brief pause before retry
      ok = await applyShelf(shelf, color);
    }

    if (ok) {
      okCount++;
      // Gentle pacing between shelves so UDP packets don't bunch up
      await sleep(50);
    } else {
      failed.push(shelf);
      // Slight pause before moving on so we don't hammer the device
      await sleep(40);
    }
  }

  if (failed.length) {
    statusEl.classList.add('error');
    statusEl.textContent = `Partial: ${okCount} applied, failed: ${failed.join(', ')}`;
  } else {
    statusEl.textContent = `Applied to ${okCount} shelves.`;
  }
}

// Hook up per-shelf buttons (single-shot)
document.querySelectorAll('button[data-shelf]').forEach(btn => {
  btn.addEventListener('click', async () => {
    const shelfNo = parseInt(btn.dataset.shelf, 10);
    await applyShelvesSequential([shelfNo], pickColor());
  });
});

// "Apply to All": run in the exact cupboard order, sequentially
document.getElementById('all').addEventListener('click', async () => {
  const color = pickColor();
  // Order: 5 | 1, 6 | 2, 7 | 3, 8 | 4
  const order = [5, 1, 6, 2, 7, 3, 8, 4];
  await applyShelvesSequential(order, color);
});
</script>
</body>
</html>
