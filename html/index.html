<html>
<script>
var newImage = new Image();

function updateImage() {
    if (newImage.complete) {
           newImage.src = document.getElementById("img").src;
           var temp = newImage.src;
           document.getElementById("img").src = newImage.src;
           newImage = new Image();
           newImage.src = temp + "?" + new Date().getTime();
    }
    setTimeout(updateImage, 250);
};
</script>
<body onload="updateImage();">
<h1>AtariPi</h1>
<hr />
<img id="img" src="/api/screenshot.jpg" />
<hr />
<div>
    <input type="color" id="color" name="color" value="#e66465" onchange="alert('Hahn');" />
    <label for="head">AmbiLight Color</label>
</div>
